server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
    }

    location /health-backend {
        proxy_pass http://backend:8000/health;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
