<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autopilot Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2rem; width: 420px; text-align: center; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; color: #38bdf8; }
    p.subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; margin-bottom: 1rem; }
    .badge.ok { background: #14532d; color: #4ade80; }
    .badge.err { background: #450a0a; color: #f87171; }
    .badge.loading { background: #1e3a5f; color: #93c5fd; }
    button { margin-top: 1rem; padding: 0.6rem 1.4rem; background: #0ea5e9; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #0284c7; }
    .response { margin-top: 1rem; background: #0f172a; border-radius: 8px; padding: 0.8rem; font-size: 0.85rem; color: #94a3b8; text-align: left; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Autopilot Demo</h1>
    <p class="subtitle">Frontend → Backend on GKE</p>
    <div id="status" class="badge loading">Checking...</div>
    <br/>
    <button onclick="fetchStatus()">Ping Backend</button>
    <div id="response" class="response" style="display:none"></div>
  </div>

  <script>
    async function fetchStatus() {
      const statusEl = document.getElementById("status");
      const responseEl = document.getElementById("response");
      statusEl.className = "badge loading";
      statusEl.textContent = "Fetching...";
      responseEl.style.display = "none";
      try {
        const res = await fetch(`/api/status`);
        const data = await res.json();
        statusEl.className = "badge ok";
        statusEl.textContent = "Connected";
        responseEl.style.display = "block";
        responseEl.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        statusEl.className = "badge err";
        statusEl.textContent = "Backend Unreachable";
        responseEl.style.display = "block";
        responseEl.textContent = e.message;
      }
    }

    fetchStatus();
  </script>
</body>
</html>
