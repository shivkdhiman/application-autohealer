apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: autohealer
  labels:
    app: backend
    autohealer/repair-needed: "false"
    autohealer/failure-reason: "none"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        autohealer/repair-needed: "false"
        autohealer/failure-reason: "none"
    spec:
      containers:
        - name: backend
          image: gcr.io/n8n-docs-502206/autopilot-backend:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: autohealer
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: LoadBalancer
