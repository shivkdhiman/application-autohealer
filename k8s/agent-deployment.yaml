apiVersion: v1
kind: ServiceAccount
metadata:
  name: autopilot-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autopilot-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollback"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autopilot-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: autopilot-agent
subjects:
  - kind: ServiceAccount
    name: autopilot-agent
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autopilot-agent
  labels:
    app: autopilot-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autopilot-agent
  template:
    metadata:
      labels:
        app: autopilot-agent
    spec:
      serviceAccountName: autopilot-agent
      containers:
        - name: agent
          image: REGISTRY/autopilot-agent:latest
          env:
            - name: NAMESPACE
              value: "default"
            - name: POLL_INTERVAL
              value: "30"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api_key
